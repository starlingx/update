---
- project:
    templates:
      - publish-stx-docs
      - stx-api-ref-jobs
    check:
      jobs:
        - openstack-tox-linters
        - py3-bandit
        - py3-flake8
        - patch-alarm-tox-pylint
        - patch-alarm-tox-py39
        - software-tox-flake8
        - software-tox-pylint
        - software-tox-py39
        - software-client-tox-flake8
        - software-client-tox-pylint
    gate:
      jobs:
        - openstack-tox-linters
        - py3-bandit
        - py3-flake8
        - patch-alarm-tox-pylint
        - patch-alarm-tox-py39
        - software-tox-flake8
        - software-tox-pylint
        - software-client-tox-flake8
        - software-client-tox-pylint
    post:
      jobs:
        - stx-update-upload-git-mirror

- job:
    name: py3-bandit
    parent: tox
    nodeset: debian-bullseye
    vars:
      tox_envlist: bandit

- job:
    name: py3-flake8
    parent: tox
    nodeset: debian-bullseye
    required-projects:
      - starlingx/config
      - starlingx/fault
    vars:
      tox_envlist: flake8


- job:
    name: software-tox-py39
    parent: tox
    nodeset: debian-bullseye
    required-projects:
      - starlingx/config
      - starlingx/fault
      - starlingx/utilities
    files:
      - software/*
    vars:
      tox_envlist: py39
      tox_extra_args: -c software/tox.ini

- job:
    name: software-tox-flake8
    parent: tox
    nodeset: debian-bullseye
    required-projects:
      - starlingx/config
      - starlingx/fault
      - starlingx/utilities
    files:
      - software/*
    vars:
      tox_envlist: flake8
      tox_extra_args: -c software/tox.ini


- job:
    name: software-tox-pylint
    parent: tox
    nodeset: debian-bullseye
    required-projects:
      - starlingx/config
      - starlingx/fault
      - starlingx/utilities
    files:
      - software/*
    vars:
      tox_envlist: pylint
      tox_extra_args: -c software/tox.ini


- job:
    name: software-client-tox-flake8
    parent: tox
    nodeset: debian-bullseye
    required-projects:
      - starlingx/config
      - starlingx/utilities
    files:
      - software-client/*
    vars:
      tox_envlist: flake8
      tox_extra_args: -c software-client/tox.ini


- job:
    name: software-client-tox-pylint
    parent: tox
    nodeset: debian-bullseye
    required-projects:
      - starlingx/config
    files:
      - software-client/*
    vars:
      tox_envlist: pylint
      tox_extra_args: -c software-client/tox.ini
    voting: false


- job:
    name: patch-alarm-tox-pylint
    parent: tox
    nodeset: debian-bullseye
    required-projects:
      - starlingx/config
      - starlingx/fault
    files:
      - patch-alarm/patch-alarm/*
    vars:
      bindep_profile: pylint
      tox_envlist: pylint
      tox_extra_args: -c patch-alarm/patch-alarm/tox.ini

- job:
    name: patch-alarm-tox-py39
    parent: tox-py39
    nodeset: debian-bullseye
    required-projects:
      - starlingx/config
      - starlingx/fault
    files:
      - patch-alarm/patch-alarm/*
    vars:
      bindep_profile: python3
      python_version: 3.9
      tox_envlist: py39
      tox_extra_args: -c patch-alarm/patch-alarm/tox.ini

- job:
    name: flock-devstack-update
    parent: flock-devstack-base-min
    required-projects:
      - starlingx/integ
    vars:
      tox_envlist: functional
      devstack_plugins:
        # integ: https://opendev.org/starlingx/integ
        update: https://opendev.org/starlingx/update
- job:
    name: stx-update-upload-git-mirror
    parent: upload-git-mirror
    description: >
      Mirrors opendev.org/starlingx/update to
      github.com/starlingx/update
    vars:
      git_mirror_repository: starlingx/update
    secrets:
      - name: git_mirror_credentials
        secret: stx-update-github-secret3
        pass-to-parent: true

